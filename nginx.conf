worker_processes  1;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;
  resolver 8.8.8.8 1.1.1.1 ipv6=off;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Cloud API to upstream (HTTPS)
    location /api/cloud/ {
      proxy_pass https://app.clouduse01.com/api/cloud/;
      proxy_http_version 1.1;
      proxy_set_header Host app.clouduse01.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
    }

    # Proxy MediaMTX API to host (dynamic path add/edit)
    location /api/mediamtx/ {
      proxy_pass http://3.121.98.176:9997/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Device CGI proxy (HTTPS)
    # /api/device-proxy-https/{host:port}/... -> https://{host:port}/...
    location ~ ^/api/device-proxy-https/(?<hostport>[^/]+)/(.*)$ {
      proxy_pass https://$hostport/$2;
      proxy_http_version 1.1;
      proxy_set_header Host $hostport;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name off;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # Device CGI proxy (HTTP)
    # /api/device-proxy-http/{host:port}/... -> http://{host:port}/...
    location ~ ^/api/device-proxy-http/(?<hostport>[^/]+)/(.*)$ {
      proxy_pass http://$hostport/$2;
      proxy_http_version 1.1;
      proxy_set_header Host $hostport;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # Proxy WebRTC WHEP through same-origin to bypass browser CORS/mixed-content
    # /webrtc/* -> http://<server-ip>:8889/*
    location /webrtc/ {
      proxy_pass http://3.121.98.176:8889/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backward compatibility: rewrite any /webrtc/{path}/whep (except mystream) to /webrtc/mystream/whep
    location ~ ^/webrtc/(?!mystream/)[^/]+/whep$ {
      rewrite ^ /webrtc/mystream/whep last;
    }

    # Avoid caching index.html to ensure latest bundle is used
    location = /index.html {
      add_header Cache-Control "no-store, must-revalidate";
    }

    # Serve the SPA at root
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Support accessing the SPA under /monitor/ prefix
    # Make sure both HTML fallback and static assets are correctly resolved
    location /monitor/ {
      alias /usr/share/nginx/html/;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # Static assets under /monitor/assets/ -> /usr/share/nginx/html/assets/
    location ^~ /monitor/assets/ {
      alias /usr/share/nginx/html/assets/;
      expires 7d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Service worker under /monitor/registerSW.js -> /usr/share/nginx/html/registerSW.js
    location = /monitor/registerSW.js {
      alias /usr/share/nginx/html/registerSW.js;
      try_files $uri =404;
    }

    # Static assets caching
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico)$ {
      expires 7d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }
  }
}
